<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Pro 莫蘭迪特仕版 (雲端版)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --main-dark: #8c7a6b;   
            --main-blue: #dcb38b;   
            --up: #e26b6b;          
            --down: #8bc4a9;        
            --watch: #e6a87c;       
            --div: #e5b662;         
            --day: #b496c6;         
            --short: #84b2d1;       
            --long: #a89f91;        
            --bg-light: #fdfbf7;    
            --text-main: #5c4e46;   
            --text-sub: #9e8e82;    
        }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: var(--bg-light); margin: 0; padding-bottom: 120px; color: var(--text-main); }
        
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--main-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #eaddcf; background: transparent; }
        .dot.filled { background: var(--main-blue); border-color: var(--main-blue); box-shadow: 0 0 10px rgba(220,179,139,0.5); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .numpad button { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.1); color: white; font-size: 32px; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        .numpad button:active { background: var(--main-blue); }

        .dashboard { background: var(--main-dark); color: white; padding: 15px; border-radius: 0 0 24px 24px; display: flex; flex-direction: column; gap: 10px; position: relative; transition: 0.3s; }
        .demo-badge { position: absolute; top: 15px; right: 15px; background: var(--div); color: white; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 12px; }
        .dash-section { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; }
        .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-label { font-size: 11px; color: #eaddcf; font-weight: 700; margin-bottom: 2px; }
        .stat-value { font-size: 18px; font-weight: 900; }
        .up-text { color: var(--up); font-weight: 900; }
        .down-text { color: var(--down); font-weight: 900; }
        .pct-text { font-size: 13px; font-weight: 700; opacity: 0.9; margin-left: 2px; }

        .header { background: white; padding: 15px 15px 5px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(140,122,107,0.08); border-bottom: 1px solid #f4efe9; }
        .search-area { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-bar { background: #f4efe9; border-radius: 10px; padding: 10px; display: flex; align-items: center; flex: 1; }
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; font-size: 15px; font-weight: bold; color: var(--text-main); }
        .search-bar input::placeholder { color: var(--text-sub); }
        .date-picker { background: #f4efe9; border: none; border-radius: 10px; padding: 0 10px; font-weight: 900; color: var(--main-dark); outline: none; font-family: inherit; }
        
        .tab-group { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .tab-group::-webkit-scrollbar { display: none; } 
        .tab-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid #eaddcf; background: white; font-weight: 700; cursor: pointer; font-size: 13px; white-space: nowrap; color: var(--text-sub); }
        .tab-btn.active { background: var(--main-dark); color: white; border-color: var(--main-dark); }
        .tab-btn-action { padding: 8px 14px; border-radius: 20px; border: none; background: #f4efe9; color: var(--text-main); font-weight: 900; font-size: 13px; white-space: nowrap; cursor: pointer; }

        .card-grid { display: grid; gap: 12px; padding: 15px; grid-template-columns: repeat(2, 1fr); }
        .grid-item { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(140,122,107,0.05); border: 1px solid #f4efe9; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .grid-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; border-bottom: 2px solid #f4efe9; padding-bottom: 8px; margin-top: 8px; }
        .grid-ticker { font-size: 26px; font-weight: 900; color: var(--text-main); letter-spacing: -0.5px; }
        .grid-name { font-size: 13px; font-weight: 700; color: var(--text-sub); }
        
        .grid-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; font-weight: 700; align-items: flex-start; }
        .grid-val { font-weight: 900; color: var(--text-main); font-size: 14px; }
        
        .badge-sold { position: absolute; top: 12px; right: 12px; background: #cbbcc2; color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge-watch { position: absolute; top: 12px; right: 12px; background: var(--watch); color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge-day { position: absolute; top: 12px; right: 12px; background: var(--day); color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge-short { position: absolute; top: 12px; right: 12px; background: var(--short); color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge-long { position: absolute; top: 12px; right: 12px; background: var(--long); color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }

        .desktop-view .card-grid { grid-template-columns: repeat(4, 1fr); max-width: 1000px; margin: 0 auto; }
        .desktop-view .dashboard, .desktop-view .header { max-width: 1000px; margin: 0 auto; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(92,78,70,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-container { background: white; width: 92%; max-width: 500px; border-radius: 20px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; margin: 20px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #f4efe9; display: flex; justify-content: space-between; align-items: center; background: #fdfbf7; }
        .modal-content { padding: 20px; overflow-y: auto; flex: 1; }
        
        .tx-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .tx-item { background: #fdfbf7; border: 1px solid #f4efe9; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .tx-type.buy { color: var(--up); background: rgba(226, 107, 107, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .tx-type.sell { color: var(--down); background: rgba(139, 196, 169, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .tx-type.watch { color: var(--watch); background: rgba(230, 168, 124, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .tx-type.div { color: var(--div); background: rgba(229, 182, 98, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; }

        .chart-wrapper { margin-top: 20px; border: 1px solid #f4efe9; padding: 15px; border-radius: 12px; background: white; }
        .chart-tabs { display: flex; background: #f4efe9; border-radius: 8px; overflow: hidden; padding: 2px; margin-bottom: 10px; gap: 2px; }
        .chart-tab { flex: 1; padding: 6px 2px; font-size: 11px; border: none; background: transparent; cursor: pointer; font-weight: 700; font-family: inherit; border-radius: 6px; color: var(--text-sub); }
        .chart-tab.active { background: white; color: var(--text-main); box-shadow: 0 1px 3px rgba(140,122,107,0.1); }

        .form-box { background: white; width: 92%; max-width: 500px; border-radius: 24px; padding: 25px; overflow-y: auto; max-height: 90vh; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
        .input-control { width: 100%; padding: 12px; border: 1px solid #eaddcf; border-radius: 10px; font-size: 16px; box-sizing: border-box; font-weight: 700; font-family: inherit; color: var(--text-main); }
        
        .type-toggle { display: flex; background: #f4efe9; border-radius: 10px; padding: 4px; margin-bottom: 15px; gap: 4px; overflow-x: auto;}
        .type-btn { flex: 1; padding: 10px 5px; text-align: center; font-weight: 900; border-radius: 8px; cursor: pointer; color: var(--text-sub); transition: 0.2s; font-size: 13px; white-space: nowrap;}
        .type-btn.active.buy { background: var(--up); color: white; }
        .type-btn.active.sell { background: var(--down); color: white; }
        .type-btn.active.watch { background: var(--watch); color: white; }
        .type-btn.active.div { background: var(--div); color: white; }

        .fab { position: fixed; bottom: 30px; right: 30px; background: var(--main-blue); color: white; width: 60px; height: 60px; border-radius: 30px; font-size: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 10px 15px -3px rgba(220,179,139,0.5); cursor: pointer; border: none; z-index: 100; transition: 0.2s; }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body class="mobile-view">

<div id="loginScreen">
    <div style="font-size: 28px; font-weight: 900; margin-bottom: 10px; color: white;">Stock Pro</div>
    <div style="font-size: 12px; font-weight: bold; margin-bottom: 30px; color: #eaddcf;">(莫蘭迪特仕版 - 雲端連線)</div>
    <div class="pin-dots">
        <span class="dot" id="dot-0"></span><span class="dot" id="dot-1"></span>
        <span class="dot" id="dot-2"></span><span class="dot" id="dot-3"></span>
    </div>
    <div class="numpad">
        <button onclick="pressKey('1')">1</button><button onclick="pressKey('2')">2</button><button onclick="pressKey('3')">3</button>
        <button onclick="pressKey('4')">4</button><button onclick="pressKey('5')">5</button><button onclick="pressKey('6')">6</button>
        <button onclick="pressKey('7')">7</button><button onclick="pressKey('8')">8</button><button onclick="pressKey('9')">9</button>
        <div></div><button onclick="pressKey('0')">0</button><button onclick="pressKey('back')" style="border:none;">⌫</button>
    </div>
</div>

<div class="dashboard">
    <div class="demo-badge" id="cloudStatusBadge">雲端連線中...</div>
    <div style="font-size: 12px; color:#eaddcf; font-weight: 900; margin-bottom: 2px;">
        <span id="dash-title">☕ 總覽 (全部)</span>
    </div>
    
    <div class="dash-section">
        <div class="dash-grid">
            <div><div class="stat-label">投入本金</div><div class="stat-value" id="dash-cost">$0</div></div>
            <div><div class="stat-label">目前市值</div><div class="stat-value" id="dash-market">$0</div></div>
            <div><div class="stat-label">未實現損益</div><div class="stat-value" id="dash-unrealized">$0</div></div>
            <div><div class="stat-label">已實現淨利</div><div class="stat-value" id="dash-realized">$0</div></div>
        </div>
    </div>
    
    <div style="background: rgba(220,179,139,0.15); border-radius: 10px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(220,179,139,0.3);">
        <div>
            <div style="font-size: 11px; font-weight: 700; color: #eaddcf;">指定日 (<span id="dash-date-label">今日</span>) 淨利</div>
            <div style="font-size: 10px; color: #eaddcf; margin-top:2px; opacity:0.8;">(依目前分類計算)</div>
        </div>
        <div id="dash-daily-pnl" style="font-size: 20px; font-weight: 900; color: white;">$0</div>
    </div>
</div>

<div class="header">
    <div class="search-area">
        <div class="search-bar">🔍 <input type="text" id="searchInput" placeholder="搜尋代號或名稱..." oninput="renderGrid()"></div>
        <input type="date" id="filterDate" class="date-picker" onchange="renderGrid()">
    </div>
    
    <input type="file" id="htmlUploader" accept=".html" style="display:none;" onchange="handleHtmlUpload(event)">
    
    <div class="tab-group" style="padding-bottom: 5px;">
        <button class="tab-btn-action" style="background:var(--main-blue); color:white;" onclick="openQuickPrice()">✏️ 更新目前分類時價</button>
        <button class="tab-btn-action" style="background:#b496c6; color:white;" onclick="document.getElementById('htmlUploader').click()">📤 匯入 Goodinfo</button>
        <button class="tab-btn-action" onclick="openAnalysis()">📊 資產分析</button>
        <button class="tab-btn-action" onclick="exportCSV()">📥 匯出報表</button>
    </div>
    
    <div class="tab-group">
        <button class="tab-btn active" id="filter-all" onclick="setFilter('all')">全部</button>
        <button class="tab-btn" id="filter-day_trade" onclick="setFilter('day_trade')">當沖(持)</button>
        <button class="tab-btn" id="filter-short_term" onclick="setFilter('short_term')">短期</button>
        <button class="tab-btn" id="filter-long_term" onclick="setFilter('long_term')">長期</button>
        <button class="tab-btn" id="filter-watch" onclick="setFilter('watch')">觀望</button>
        <button class="tab-btn" id="filter-sold_std" onclick="setFilter('sold_std')">一般結清</button>
        <button class="tab-btn" id="filter-sold_day" onclick="setFilter('sold_day')">當沖結清</button>
    </div>
</div>

<div id="portfolioGrid" class="card-grid"></div>
<button class="fab" onclick="openForm()">＋</button>

<div id="analysisModal" class="modal">
    <div class="modal-container">
        <div class="modal-header">
            <div style="font-size:18px; font-weight:900; color:var(--text-main);">📊 庫存資產配置</div>
            <button onclick="closeAnalysis()" style="border:none; background:none; font-size:24px; color:var(--text-sub); cursor:pointer;">×</button>
        </div>
        <div class="modal-content" style="display:flex; flex-direction:column; align-items:center;">
            <div style="font-size:12px; color:var(--text-sub); font-weight:bold; margin-bottom:15px;">依照目前市值的資金佔比 (不含觀望與結清)</div>
            <div style="position: relative; height:250px; width:100%;">
                <canvas id="assetPieChart"></canvas>
            </div>
            <div id="pieEmptyMsg" style="display:none; color:var(--text-sub); font-weight:bold; margin-top:20px;">目前沒有持倉股票喔！</div>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <span id="detTicker" style="font-size:24px; font-weight:900; color:var(--text-main);">-</span>
                <span id="detName" style="font-size:14px; font-weight:700; color:var(--text-sub); margin-left:8px;">-</span>
            </div>
            <button onclick="closeDetail()" style="border:none; background:none; font-size:24px; color:var(--text-sub); cursor:pointer;">×</button>
        </div>
        <div class="modal-content">
            <div id="detStats" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; background:var(--bg-light); padding:15px; border-radius:12px; border:1px solid #f4efe9; margin-bottom: 20px;"></div>

            <div class="chart-wrapper">
                <div style="font-size:13px; font-weight:900; color:var(--text-main); margin-bottom:10px;">📈 時價線圖 <span style="font-size:10px; color:var(--up); font-weight:normal;">(亮點為最新報價)</span></div>
                <div class="chart-tabs">
                    <button class="chart-tab" id="tab-day" onclick="updateChart('day')">當日</button>
                    <button class="chart-tab" id="tab-week" onclick="updateChart('week')">當周</button>
                    <button class="chart-tab active" id="tab-month" onclick="updateChart('month')">當月</button>
                    <button class="chart-tab" id="tab-quarter" onclick="updateChart('quarter')">當季</button>
                    <button class="chart-tab" id="tab-year" onclick="updateChart('year')">當年</button>
                </div>
                <div style="height: 180px; width: 100%;"><canvas id="priceChart"></canvas></div>
            </div>

            <div style="font-size:14px; font-weight:900; color:var(--text-main); margin:15px 0 10px; display:flex; justify-content:space-between; align-items:center;">
                <span>📝 歷史紀錄</span>
                <button onclick="openForm({ticker: document.getElementById('detTicker').innerText, name: document.getElementById('detName').innerText})" style="font-size:12px; padding:6px 10px; background:var(--main-blue); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">+ 新增</button>
            </div>
            <div id="txList" class="tx-list"></div>
        </div>
    </div>
</div>

<div id="formModal" class="modal" style="z-index: 300;">
    <div class="form-box">
        <h3 id="formTitle" style="margin-top:0; font-size:20px; font-weight:900; color:var(--text-main);">新增紀錄</h3>
        
        <div class="type-toggle">
            <div class="type-btn active buy" id="typeBuy" onclick="setTxType('buy')">買進</div>
            <div class="type-btn sell" id="typeSell" onclick="setTxType('sell')">賣出</div>
            <div class="type-btn watch" id="typeWatch" onclick="setTxType('watch')">👀 觀望</div>
            <div class="type-btn div" id="typeDiv" onclick="setTxType('div')">💰 領息</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 2fr; gap:10px;">
            <div class="input-group"><label>代號</label><input type="text" class="input-control" id="formTicker" placeholder="2330"></div>
            <div class="input-group"><label>名稱</label><input type="text" class="input-control" id="formName" placeholder="台積電"></div>
        </div>

        <div class="input-group" id="strategyGroup" style="background:#f4efe9; padding:10px; border-radius:10px;">
            <label>交易策略分類</label>
            <select class="input-control" id="formStrategy" style="background:white;">
                <option value="day_trade">⚡ 當沖</option>
                <option value="short_term">📈 短期持有</option>
                <option value="long_term" selected>☕ 長期持有</option>
            </select>
        </div>

        <div style="display:grid; grid-template-columns:2fr 1fr; gap:10px;" id="qtyGroup">
            <div class="input-group"><label>數量</label><input type="number" class="input-control" id="formQty" placeholder="1000"></div>
            <div class="input-group"><label>單位</label>
                <select class="input-control" id="formUnit">
                    <option value="share">股</option>
                    <option value="lot">張 (1000股)</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="input-group"><label id="priceLabel">成交單價</label><input type="number" step="0.01" class="input-control" id="formPrice"></div>
            <div class="input-group"><label>日期</label><input type="date" class="input-control" id="formDate"></div>
        </div>
        
        <div class="input-group" id="watchCurrentPriceGroup" style="display:none; background:rgba(229, 182, 98, 0.1); padding:10px; border-radius:10px;">
            <label style="color:#b28431;">目前市場時價 (供系統同步追蹤)</label>
            <input type="number" step="0.01" class="input-control" id="formCurrentPrice" placeholder="輸入現在股價..." style="border-color:var(--div); background:white;">
        </div>
        
        <div class="input-group" id="feeGroup" style="display:none; background:rgba(226, 107, 107, 0.1); padding:10px; border-radius:10px;">
            <label style="color:var(--up);">交易成本 (手續費/證交稅)</label>
            <input type="number" step="1" class="input-control" id="formFee" placeholder="輸入總金額 (如: 150)" style="border-color:#eebfbf;">
        </div>
        
        <div class="input-group"><label>備註/策略</label><input type="text" class="input-control" id="formMemo" placeholder="如: 等待突破 / 停損點設定"></div>

        <button onclick="saveTransaction()" style="width:100%; padding:14px; background:var(--main-dark); color:white; border:none; border-radius:10px; font-size:16px; font-weight:900; cursor:pointer; margin-top:10px;">確認送出</button>
        <button onclick="closeForm()" style="width:100%; padding:12px; background:transparent; color:var(--text-sub); border:none; margin-top:5px; font-weight:700; cursor:pointer;">取消</button>
    </div>
</div>

<script>
    let currentPin = '';
    let isFirebaseConnected = false;

    function pressKey(key) {
        if (key === 'back') currentPin = currentPin.slice(0, -1); 
        else if (currentPin.length < 4) currentPin += key; 
        
        for (let i = 0; i < 4; i++) {
            document.getElementById(`dot-${i}`).className = i < currentPin.length ? 'dot filled' : 'dot';
        }
        
        if (currentPin.length === 4) {
            setTimeout(() => {
                if (currentPin === '0000' || currentPin === '1234') { 
                    document.body.className = currentPin === '0000' ? 'mobile-view' : 'desktop-view'; 
                    document.getElementById('loginScreen').style.display = 'none'; 
                    checkFirebaseStatus(); 
                } else { 
                    Swal.fire({icon:"error", title:"密碼錯誤", confirmButtonColor:"#dcb38b"}); 
                    currentPin = ''; 
                    for(let i=0;i<4;i++) document.getElementById(`dot-${i}`).className='dot'; 
                }
            }, 100);
        }
    }

    function checkFirebaseStatus() {
        if (!isFirebaseConnected) {
            document.getElementById('cloudStatusBadge').innerText = "本機測試中";
            document.getElementById('cloudStatusBadge').style.background = "#9e8e82";
        } else {
            document.getElementById('cloudStatusBadge').innerText = "雲端同步中";

    function handleHtmlUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        Swal.fire({ title: '🔍 讀取解析中...', text: '正在將檔案轉換為您的專屬線圖', didOpen: () => Swal.showLoading() });

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const text = e.target.result;
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                // 1. 智慧尋找股票代號
                let ticker = '';
                const caption = doc.querySelector('caption');
                if (caption && caption.innerText) {
                    const match = caption.innerText.match(/(\d{4,5})/);
                    if (match) ticker = match[1];
                }
                if (!ticker) {
                    const title = doc.querySelector('title');
                    if (title && title.innerText) {
                        const match = title.innerText.match(/(\d{4,5})/);
                        if (match) ticker = match[1];
                    }
                }

                if (!ticker) {
                    Swal.fire({icon: 'error', title: '錯誤', text: '無法從檔案標題中辨識出股票代號', confirmButtonColor: '#dcb38b'});
                    event.target.value = ''; return;
                }

                // 2. 爬取所有日期與收盤價
                const rows = doc.querySelectorAll('tr');
                let newHistory = [];

                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 5) {
                        let dateText = cells[0].innerText.trim();
                        // 判斷是否為 Goodinfo 的日期格式，例如 '26/04/20
                        if (/^'\d{2}\/\d{2}\/\d{2}$/.test(dateText)) {
                            let parts = dateText.replace("'", "").split('/');
                            let formattedDate = `20${parts[0]}-${parts[1]}-${parts[2]}`;
                            let price = parseFloat(cells[4].innerText.trim());
                            
                            if (!isNaN(price)) {
                                newHistory.push({ date: formattedDate, price: price });
                            }
                        }
                    }
                });

                if (newHistory.length === 0) {
                     Swal.fire({icon: 'error', title: '錯誤', text: '在此檔案中找不到符合格式的歷史報價', confirmButtonColor: '#dcb38b'});
                     event.target.value = ''; return;
                }

                // 照日期從小到大排序 (確保線圖是往右畫)
                newHistory.sort((a,b) => new Date(a.date) - new Date(b.date));

                // 3. 寫入本地資料庫並重新繪圖
                if (!marketPrices[ticker]) {
                    marketPrices[ticker] = { price: newHistory[newHistory.length-1].price, history: newHistory };

                    marketPrices[ticker].history = newHistory;

                event.target.value = ''; // 清空上傳器狀態，方便下次選同一個檔案

            } catch(err) {

                Swal.fire({icon: 'error', title: '解析失敗', text: '請確認您上傳的是 Goodinfo 台灣股市資訊網下載的 HTML 檔', confirmButtonColor: '#dcb38b'});

    function calculatePortfolio() {
        portfolio = {};
        allTransactions.forEach(tx => {
            if (!portfolio[tx.ticker]) portfolio[tx.ticker] = { ticker: tx.ticker, name: tx.name, shares: 0, totalCost: 0, realizedGain: 0, realizedCostBasis: 0, history: [], hasTrade: false, watchPrice: 0, strategy: 'long_term' };
            let p = portfolio[tx.ticker]; p.history.push(tx);

            if (tx.type === 'buy') {
                p.shares += tx.quantity; 
                p.totalCost += (tx.price * tx.quantity) + (tx.fee || 0); 
                p.hasTrade = true; 
                if(tx.strategy) p.strategy = tx.strategy; 
            } else if (tx.type === 'sell') {
                let avgCost = p.shares > 0 ? (p.totalCost / p.shares) : 0;
                let sellValue = tx.price * tx.quantity; let costBasis = avgCost * tx.quantity;
                let netGain = sellValue - costBasis - (tx.fee || 0);
                
                tx.costBasis = costBasis; tx.calculatedGain = netGain; p.realizedGain += netGain; p.realizedCostBasis += costBasis; 
                p.shares -= tx.quantity; p.totalCost -= costBasis; p.hasTrade = true;
            } else if (tx.type === 'watch') { p.watchPrice = tx.price; 
            } else if (tx.type === 'div') { p.realizedGain += tx.price; tx.calculatedGain = tx.price; p.hasTrade = true; }
        });

        Object.values(portfolio).forEach(p => p.history.sort((a,b) => new Date(b.date) - new Date(a.date)));

        Object.values(portfolio).forEach(p => {
            if (p.shares > 0) p.status = p.strategy; else if (p.hasTrade) p.status = (p.strategy === 'day_trade' ? 'sold_day' : 'sold_std'); else p.status = 'watch';
            let mData = marketPrices[p.ticker] || {};
            p.currentPrice = mData.price || (p.status === 'watch' ? p.watchPrice : (p.shares>0 ? (p.totalCost/p.shares) : 0));
            p.avgPrice = p.shares > 0 ? (p.totalCost / p.shares) : 0; p.marketValue = p.shares * p.currentPrice; p.unrealizedGain = p.marketValue - p.totalCost;
            
            p.roiPercent = (p.shares > 0 && p.totalCost > 0) ? (p.unrealizedGain / p.totalCost) * 100 : 0;
            p.realizedRoiPercent = (p.realizedCostBasis > 0) ? (p.realizedGain / p.realizedCostBasis) * 100 : 0;
        });
        renderGrid(); 
    }

                    </div>
                    <div style="border-top:1px solid var(--bg-light); margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:11px; color:var(--text-sub); font-weight:700;">未實現損益</span>
                        <span class="${gain>=0?'up-text':'down-text'}" style="font-size:14px; font-weight:900;">${gain>=0?'+':''}${Math.round(gain).toLocaleString()}<span class="pct-text">${percentStr}</span></span>
                    </div>
                `;
            } else {
                let gain = p.realizedGain; let percentStr = ` (${p.realizedRoiPercent.toFixed(2)}%)`; 
                contentHtml = `
                    <div class="grid-row"><span>狀態</span><span class="grid-val" style="color:var(--main-dark);">已結清 (持股 0)</span></div>
                    <div class="grid-row"><span>結清總成本</span><span class="grid-val">$${Math.round(p.realizedCostBasis).toLocaleString()}</span></div>
                    <div class="grid-row"><span>目前市場報價</span><span class="grid-val">$${p.currentPrice.toFixed(2)}</span></div>
                    <div style="border-top:1px solid var(--bg-light); margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:11px; color:var(--text-sub); font-weight:700;">總實現(淨)損益</span>
                        <span class="${gain>=0?'up-text':'down-text'}" style="font-size:14px; font-weight:900;">${gain>=0?'+':''}${Math.round(gain).toLocaleString()}<span class="pct-text">${percentStr}</span></span>
                    </div>
                `;
            }

            grid.innerHTML += `
                <div class="grid-item" onclick="showDetail('${p.ticker}')">
                    ${badge}
                    <div class="grid-header"><div class="grid-ticker">${p.ticker}</div><div class="grid-name">${p.name}</div></div>
                    ${contentHtml}
                </div>
            `;
        });

        const fmt = val => '$' + Math.round(val).toLocaleString();
        let dashUnrealizedPct = dCost > 0 ? (dUnrealized / dCost) * 100 : 0; let dashRealizedPct = dRealizedCost > 0 ? (dRealized / dRealizedCost) * 100 : 0; let dashDailyPct = dDailyCost > 0 ? (dDailyPnl / dDailyCost) * 100 : 0;

        document.getElementById('dash-cost').innerText = fmt(dCost); document.getElementById('dash-market').innerText = fmt(dMarket);
        document.getElementById('dash-unrealized').innerHTML = `${dUnrealized>=0?'+':''}${fmt(dUnrealized)} <span class="pct-text">(${dashUnrealizedPct.toFixed(2)}%)</span>`; document.getElementById('dash-unrealized').className = 'stat-value ' + (dUnrealized>=0?'up-text':'down-text');
        document.getElementById('dash-realized').innerHTML = `${dRealized>=0?'+':''}${fmt(dRealized)} <span class="pct-text" style="font-size:12px;">(${dashRealizedPct.toFixed(2)}%)</span>`; document.getElementById('dash-realized').style.color = dRealized >= 0 ? 'var(--up)' : 'var(--down)';
        let dailyPctStr = dDailyCost > 0 ? ` <span class="pct-text" style="font-size:14px;">(${dashDailyPct.toFixed(2)}%)</span>` : '';
        document.getElementById('dash-daily-pnl').innerHTML = `${dDailyPnl>=0?'+':''}${fmt(dDailyPnl)}${dailyPctStr}`; document.getElementById('dash-daily-pnl').style.color = dDailyPnl >= 0 ? 'var(--up)' : 'var(--down)';
    }

    function openAnalysis() {
        document.getElementById('analysisModal').style.display = 'flex'; let activeItems = Object.values(portfolio).filter(p => p.shares > 0);
        if(activeItems.length === 0) { document.getElementById('pieEmptyMsg').style.display = 'block'; if(pieChartObj) pieChartObj.destroy(); return; }
        document.getElementById('pieEmptyMsg').style.display = 'none'; const ctx = document.getElementById('assetPieChart').getContext('2d');
        if (pieChartObj) pieChartObj.destroy(); Chart.defaults.font.family = "'Inter', sans-serif";
        pieChartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: activeItems.map(p => `${p.ticker} ${p.name}`), datasets: [{ data: activeItems.map(p => p.marketValue), backgroundColor: ['#dcb38b', '#b496c6', '#84b2d1', '#8bc4a9', '#e6a87c', '#e26b6b', '#8c7a6b'], borderWidth: 2, borderColor: '#ffffff' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {font: {size: 11, weight:'bold'}, color: '#5c4e46'} } }, cutout: '65%' }
        });
    }

    function showDetail(ticker) {
        const p = portfolio[ticker]; if (!p) return;
        document.getElementById('detTicker').innerText = p.ticker; document.getElementById('detName').innerText = p.name;
        
        let statsHtml = '';
        if (p.status === 'watch') {
            statsHtml = `<div><div class="stat-label">狀態</div><div class="stat-value" style="color:var(--watch);">👀 觀望</div></div>
                         <div><div class="stat-label">目標價</div><div class="stat-value">$${p.watchPrice.toFixed(2)}</div></div>`;
        } else if (p.shares > 0) {
            let unRealClass = 'stat-value ' + (p.unrealizedGain>=0?'up-text':'down-text');
            let priceDiff = p.currentPrice - p.avgPrice; let priceDiffPct = p.avgPrice > 0 ? (Math.abs(priceDiff) / p.avgPrice) * 100 : 0;
            let priceDiffStr = `<span class="${priceDiff>=0?'up-text':'down-text'}" style="font-size:12px; margin-left:6px; white-space:nowrap;">${priceDiff>=0?'▲':'▼'}${' '}${Math.abs(priceDiff).toFixed(2)} (${priceDiffPct.toFixed(2)}%)</span>`;

            statsHtml = `<div><div class="stat-label">持有股數</div><div class="stat-value">${p.shares.toLocaleString()}</div></div>
                         <div><div class="stat-label">均價成本</div><div class="stat-value">$${p.avgPrice.toFixed(2)}</div></div>
                         <div style="grid-column: span 2;"><div class="stat-label">目前報價</div><div class="stat-value" style="display:flex; align-items:center;">$${p.currentPrice.toFixed(2)}${priceDiffStr}</div></div>
                         <div style="grid-column: span 2;"><div class="stat-label">未實現損益</div><div class="${unRealClass}">${p.unrealizedGain>=0?'+':''}${Math.round(p.unrealizedGain).toLocaleString()} <span style="font-size:14px;">(${p.roiPercent.toFixed(2)}%)</span></div></div>`;
        } else {
             let realClass = 'stat-value ' + (p.realizedGain>=0?'up-text':'down-text');
             statsHtml = `<div><div class="stat-label">狀態</div><div class="stat-value" style="color:var(--main-dark);">已結清</div></div>
                         <div><div class="stat-label">結清總成本</div><div class="stat-value">$${Math.round(p.realizedCostBasis).toLocaleString()}</div></div>
                         <div style="grid-column: span 2;"><div class="stat-label">總實現淨利 (含配息)</div><div class="${realClass}">${p.realizedGain>=0?'+':''}${Math.round(p.realizedGain).toLocaleString()} <span style="font-size:14px;">(${p.realizedRoiPercent.toFixed(2)}%)</span></div></div>`;
        }
        document.getElementById('detStats').innerHTML = statsHtml;

        window.deleteTx = async function(id) {
            const res = await Swal.fire({ title: '刪除紀錄？', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e26b6b' });
            if(res.isConfirmed) { 
                if (isFirebaseConnected) {
                    txRef.child(id).remove();
                    setTimeout(() => showDetail(ticker), 300); 
                } else {
                    allTransactions = allTransactions.filter(t => t.id !== id); calculatePortfolio(); showDetail(ticker);
                }
            }
        };

        const listHtml = p.history.map(tx => {
            let typeLabel = tx.type === 'buy' ? '買進' : (tx.type === 'sell' ? '賣出' : (tx.type === 'div' ? '領息' : '觀望'));
            let rightHtml = '';
            if(tx.type === 'watch') rightHtml = `<div style="font-size:14px; font-weight:700; color:var(--text-main);">目標價 $${tx.price}</div>`;
            else if(tx.type === 'div') rightHtml = `<div style="font-size:15px; font-weight:900; color:var(--div);">+ $${tx.price}</div>`;
            else {
                rightHtml = `<div style="font-size:15px; font-weight:900; color:var(--text-main);">${tx.quantity.toLocaleString()} 股</div><div style="font-size:13px; color:var(--text-sub); font-weight:700;">單價 $${tx.price}</div>`;
                if(tx.type === 'sell') {
                    rightHtml += `<div style="font-size:11px; color:var(--up); font-weight:bold; margin-top:4px;">成本 $${tx.fee || 0}</div>
                                  <div style="font-size:11px; color:${tx.calculatedGain>=0?'var(--down)':'var(--up)'}; font-weight:bold;">淨利 $${Math.round(tx.calculatedGain)}</div>`;
                } else if (tx.type === 'buy') {
                    if (tx.fee) rightHtml += `<div style="font-size:11px; color:var(--up); font-weight:bold; margin-top:4px;">手續費 $${tx.fee}</div>`;
                }
            }

            return `
            <div class="tx-item">
                <div style="flex:1;"><span class="tx-type ${tx.type}">${typeLabel}</span><div style="font-size:12px; color:var(--text-sub); margin-top:4px; font-weight:bold;">${tx.date}</div></div>
                <div style="flex:1; text-align:right; margin-right:10px;">${rightHtml}</div>
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button onclick='openForm(${JSON.stringify(tx).replace(/'/g, "&apos;")})' style="border:none; background:transparent; font-size:16px; cursor:pointer;">✏️</button>
                    <button onclick="deleteTx('${tx.id}')" style="border:none; background:transparent; font-size:16px; cursor:pointer;">🗑️</button>
                </div>
            </div>`;
        }).join('');
        
        document.getElementById('txList').innerHTML = listHtml || '<div style="text-align:center; color:var(--text-sub); font-size:13px; padding:20px;">尚無紀錄</div>';
        currentChartTicker = ticker; updateChart('month'); document.getElementById('detailModal').style.display = 'flex';
    }

    function updateChart(timeframe) {
        document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${timeframe}`).classList.add('active');
        let mData = marketPrices[currentChartTicker] || {}; let history = mData.history || [];
        const now = new Date(); let cutoff = new Date();
        
        if (timeframe === 'day') cutoff.setDate(now.getDate() - 1);
        else if (timeframe === 'week') cutoff.setDate(now.getDate() - 7);
        else if (timeframe === 'month') cutoff.setMonth(now.getMonth() - 1);
        else if (timeframe === 'quarter') cutoff.setMonth(now.getMonth() - 3);
        else if (timeframe === 'year') cutoff.setFullYear(now.getFullYear() - 1);

        let filtered = history.filter(h => new Date(h.date) >= cutoff);
        if (filtered.length === 0 && history.length > 0) filtered = [history[history.length-1]];

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (currentChartObj) currentChartObj.destroy();
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#9e8e82';
        
        const dataLength = filtered.length;
        const pointColors = filtered.map((_, i) => i === dataLength - 1 ? '#e26b6b' : '#dcb38b');
        const pointRadii = filtered.map((_, i) => i === dataLength - 1 ? 5 : (timeframe==='year' ? 0 : 3));

        currentChartObj = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: filtered.map(h => h.date), 
                datasets: [{ 
                    data: filtered.map(h => h.price), 
                    borderColor: '#dcb38b', 
                    backgroundColor: 'rgba(220,179,139, 0.15)', 
                    fill: true, 
                    tension: 0,
                    pointRadius: pointRadii,
                    pointBackgroundColor: pointColors,
                    pointBorderColor: pointColors
                }] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 5, font: {size: 10} } }, y: { ticks: { font: {size: 10} } } } }
        });
    }

    async function openQuickPrice() {
        let activeTickers = Object.values(portfolio).filter(p => {
            if (currentFilter === 'all') return p.shares > 0 || p.status === 'watch';
            else return p.status === currentFilter;
        });

        if (activeTickers.length === 0) return Swal.fire({title: "提示", text: "目前的分類中沒有可以更新的股票喔！", icon: "info", confirmButtonColor: '#dcb38b'});

        let html = activeTickers.map(p => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #f4efe9; padding-bottom:8px;">
                <div style="font-weight:900; color:var(--text-main); font-size:14px; text-align:left;">${p.ticker} <span style="font-size:12px; color:var(--text-sub); font-weight:700;">${p.name}</span></div>
                <input type="number" step="0.01" class="bulk-input" data-ticker="${p.ticker}" value="${p.currentPrice}" style="width:100px; padding:6px; border-radius:6px; border:1px solid #eaddcf; font-weight:900; text-align:right; color:var(--text-main);">
            </div>
        `).join('');

        const { value: res } = await Swal.fire({
            title: '批量修改時價', html: `<div style="max-height:60vh; overflow-y:auto; padding:5px;">${html}</div>`,
            showCancelButton: true, confirmButtonText: '全部更新', confirmButtonColor: '#dcb38b', cancelButtonColor: '#cbbcc2',
            preConfirm: () => Array.from(document.querySelectorAll('.bulk-input')).map(i => ({ ticker: i.dataset.ticker, price: parseFloat(i.value) }))
        });

        if (res) {
            Swal.fire({ title: '報價更新中...', didOpen: () => Swal.showLoading() });
            
            if (isFirebaseConnected) {
                let updates = {};
                res.forEach(item => { updates[item.ticker] = item.price; });
                priceRef.update(updates).then(() => {
                    Swal.fire({icon: "success", title: "完成", text:"價格已為您同步至雲端", timer: 1500, showConfirmButton: false});
                });
            } else {
                res.forEach(item => {
                    if(marketPrices[item.ticker]) {
                        marketPrices[item.ticker].price = item.price;
                        let h = marketPrices[item.ticker].history;
                        let last = h.length > 0 ? h[h.length - 1] : null;
                        if (last && last.date === todayStr) last.price = item.price; else h.push({ date: todayStr, price: item.price });
                    }
                });
                calculatePortfolio();
                Swal.fire({icon: "success", title: "完成", text:"價格已於本機更新", timer: 1500, showConfirmButton: false});
            }
        }
    }
</script>
</body>
</html>
